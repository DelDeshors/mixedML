# All available hooks: https://pre-commit.com/hooks.html
# R specific hooks: https://github.com/lorenzwalthert/precommit
fail_fast: true
repos:
# officials hooks mixed with R precommit modifications
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
        exclude: '\.Rd'
    -   id: trailing-whitespace
        exclude: README.md  # auto-generated
    -   id: check-added-large-files
        args: ['--maxkb=200']
        exclude: renv.lock
    -   id: check-executables-have-shebangs
    -   id: mixed-line-ending
        args: [--fix=lf]
    -   id: no-commit-to-branch
        args: [--branch, staging, --branch, main]
        stages: [pre-commit]
    -   id: file-contents-sorter
        files: '^\.Rbuildignore$'
# R formating
# since a temporary folder is used, the air.toml file is not found
# so the preferences are not used
# instead we used this trick: https://posit-dev.github.io/air/integration-github-actions.html#format-with---check
#-   repo: local
#    hooks:
#    -   id: airformat
#        name: airformat
#        entry: air format
#        language: system
#        types: [r]
#        pass_filenames: true
#  R precommit hooks
-   repo: https://github.com/lorenzwalthert/precommit    #  R precommit hooks
    rev: v0.4.3.9017
    hooks:
    -   id: roxygenize
        stages: [pre-merge-commit]
    # codemeta must be above use-tidy-description when both are used
    # -   id: codemeta-description-updated
    -   id: use-tidy-description
    -   id: lintr
    # -   id: readme-rmd-rendered  # automated with vignette
    -   id: parsable-R
    -   id: no-browser-statement
    -   id: no-print-statement
        exclude: renv/activate.R
    -   id: no-debug-statement
    -   id: deps-in-desc
    -   id: pkgdown
-   repo: https://github.com/pre-commit-ci/pre-commit-ci-config
    rev: v1.6.1
    hooks:
    # Only required when https://pre-commit.ci is used for config validation
    -   id: check-pre-commit-ci-config
-   repo: local
    hooks:
    -   id: forbid-to-commit
        name: Don't commit common R artifacts
        entry: Cannot commit .Rhistory, .RData, .Rds or .rds.
        language: fail
        files: '\.(Rhistory|RData|Rds|rds)$'
        # `exclude: <regex>` to allow committing specific files


# Python formating
-   repo: local
    hooks:
    -   id: black
        name: black
        entry: black .
        stages: [pre-commit]
        language: system
        types: [python]
        #  require_serial: true
        pass_filenames: false
        files: '\.py$'
-   repo: local
    hooks:
    -   id: mypy
        name: mypy
        entry: mypy inst/python
        stages: [pre-commit]
        language: system
        types: [python]
        # require_serial: true
        pass_filenames: false
        files: '\.py$'
-   repo: local
    hooks:
    -   id: mypy-test
        name: mypy-test
        entry: mypy tests/pytest/
        stages: [pre-commit]
        language: system
        types: [python]
        # require_serial: true
        pass_filenames: false
        files: '\.py$'
-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
        stages: [pre-commit]
# r testing
-   repo: local
    hooks:
    -   id: rtesting
        name: rtesting
        stages: [pre-push, post-merge]
        entry: Rscript pre-commit-utils/precommit_testthat.R_
        language: system
        pass_filenames: false
# README.md check
-   repo: local
    hooks:
    -   id: readme-md-rendered-1
        name: readme-md-rendered-1
        stages: [pre-push, post-merge]
        entry: test README.md -nt README.Rmd
        language: system
        pass_filenames: false
-   repo: local
    hooks:
    -   id: readme-md-rendered-2
        name: readme-md-rendered-2
        stages: [pre-push, post-merge]
        entry: test README.md -nt vignettes/mixedML.Rmd
        language: system
        pass_filenames: false
-   repo: local
    hooks:
    -   id: readme-md-rendered-3
        name: readme-md-rendered-3
        stages: [pre-push, post-merge]
        entry: test README.md -nt vignettes/work_with_Python.Rmd
        language: system
        pass_filenames: false
# Python testing
-   repo: local
    hooks:
    -   id: pytest
        stages: [pre-push, post-merge]
        name: pytest
        entry: python -m pytest  # python -m changes PYTHONPATH
        language: system
        pass_filenames: false
        files: '\.py$'
